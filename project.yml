name: Spoken
options:
  bundleIdPrefix: com.moss
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Spoken
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Spoken:
    type: application
    platform: macOS
    sources:
      - path: Spoken
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Spoken/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.moss.spoken
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: Spoken/Spoken.entitlements
    entitlements:
      path: Spoken/Spoken.entitlements

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spoken — 语音输入 AI 优化工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f14;
      color: #e8e8ed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #7c6af5, #a78bfa);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 8px 32px rgba(124, 106, 245, 0.3);
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #7c6af5, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      color: #8b8b96;
      font-size: 1rem;
      margin-bottom: 3rem;
    }

    .features {
      display: grid;
      gap: 1rem;
      margin-bottom: 3rem;
      text-align: left;
    }

    .feature {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 1.25rem;
    }

    .feature-icon {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .feature h3 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .feature p {
      color: #8b8b96;
      font-size: 0.875rem;
    }

    .status {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 0.5rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status p {
      color: #8b8b96;
      font-size: 0.875rem;
    }

    .version {
      margin-top: 2rem;
      color: #4a4a55;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎤</div>
    <h1>Spoken</h1>
    <p class="tagline">语音输入，AI 优化</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">✍️</div>
        <h3>文本优化</h3>
        <p>语音转文字，AI 纠错润色，自动复制到剪贴板</p>
      </div>
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <h3>Prompt 优化</h3>
        <p>把模糊想法重构为结构化 AI Prompt，想说什么就说什么</p>
      </div>
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <h3>本地优先</h3>
        <p>语音识别离线运行，MiniMax API 优化，安全快速</p>
      </div>
    </div>

    <div class="status">
      <p><span class="status-dot"></span> macOS 菜单栏 App · 开发中</p>
    </div>

    <p class="version">v0.1 · 2026</p>
  </div>
</body>
</html>
